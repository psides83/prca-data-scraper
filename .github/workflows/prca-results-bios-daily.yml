name: PRCA recent results and queued bios

on:
  schedule:
    - cron: "30 11 * * *"
  workflow_dispatch:
    inputs:
      results_lookback_days:
        description: "Number of days to overlap when discovering recent results"
        required: false
        default: "3"

concurrency:
  group: prca-results-bios-daily
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PRCA_API_BASE: https://d1kfpvgfupbmyo.cloudfront.net/services/pro_rodeo.ashx
      RESULTS_LOOKBACK_DAYS: ${{ github.event.inputs.results_lookback_days || '3' }}
      RESULTS_PAGE_SIZE: "100"
      RESULTS_DETAIL_DELAY_MS: "700"
      RESULTS_DETAIL_JITTER_MS: "400"
      ATHLETE_BIO_SCOPE: active_or_queued
      ATHLETE_BIO_DELAY_MS: "700"
      ATHLETE_BIO_JITTER_MS: "400"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify database secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is required."
            exit 1
          fi

      - name: Initialize schema
        run: npm run db:init

      - name: Discover recent results
        run: npm run results:daily

      - name: Refresh queued athlete bios
        run: npm run athletes:sync-bios
