name: PRCA contestants weekly sync

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

concurrency:
  group: prca-contestants-weekly
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PRCA_API_BASE: https://d1kfpvgfupbmyo.cloudfront.net/services/pro_rodeo.ashx
      PRCA_ATHLETES_URL: https://d1kfpvgfupbmyo.cloudfront.net/services/pro_rodeo.ashx/athletes?event_type=&letter=&page_size=15000&index=1&search_term=&search_type=&exact_search=null
      PRCA_IMAGE_BASE_URL: https://d1kfpvgfupbmyo.cloudfront.net
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
      IMAGE_SYNC_DELAY_MS: "300"
      IMAGE_SYNC_JITTER_MS: "300"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify database secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is required."
            exit 1
          fi

      - name: Initialize schema
        run: npm run db:init

      - name: Sync contestant profiles
        run: npm run contestants:sync

      - name: Sync contestant images
        run: npm run contestants:sync-images
