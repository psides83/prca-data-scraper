name: PRCA standings daily scrape

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      retry_failed:
        description: "Run unresolved failed target retry after daily scrape"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: prca-standings-daily
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PRCA_API_BASE: https://d1kfpvgfupbmyo.cloudfront.net/services/pro_rodeo.ashx
      PRCA_MEDIA_BASE: https://www.prorodeo.com
      REQUEST_DELAY_MS: "700"
      REQUEST_JITTER_MS: "400"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify database secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is required."
            exit 1
          fi

      - name: Initialize schema
        run: npm run db:init

      - name: Run daily standings scrape
        run: npm run standings:daily

      - name: Retry unresolved failed targets
        if: ${{ always() && (github.event_name == 'schedule' || inputs.retry_failed == 'true') }}
        run: npm run standings:retry-failed
